services:

  frontend:
    container_name: flexlog-frontend
    build:
      context: .
      dockerfile: docker.frontend
    depends_on:
      - backend

  backend:
    container_name: flexlog-backend
    build:
      context: .
      dockerfile: docker.backend
    environment:
      DB_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - db

  db:
    container_name: flexlog-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql


  caddy:
    container_name: flexlog-proxy
    image: caddy:latest
    ports:
      - "8086:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - backend